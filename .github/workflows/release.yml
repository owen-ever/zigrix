name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install, build, test
        run: |
          npm ci
          npm run test
          npm run build
          npm run smoke

      - name: Build dashboard
        run: npm run build:dashboard

      - name: Package
        run: |
          npm pack
          mv zigrix-*.tgz zigrix-release.tgz
          tar -czf zigrix-dist.tgz dist package.json package-lock.json README.md LICENSE examples install.sh skills
          sha256sum zigrix-release.tgz zigrix-dist.tgz install.sh > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zigrix-release.tgz
            zigrix-dist.tgz
            install.sh
            checksums.txt
