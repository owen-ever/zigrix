name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build distributions
        run: |
          npm ci
          npm run build
          tar -czf zigrix-dist.tgz dist package.json package-lock.json README.md LICENSE examples src tests docs install.sh skills legacy-python
          sha256sum zigrix-dist.tgz install.sh > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zigrix-dist.tgz
            install.sh
            checksums.txt
